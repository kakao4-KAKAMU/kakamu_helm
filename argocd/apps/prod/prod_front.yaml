apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kakamu-prod-front # prod
  namespace: argo
  annotations: # 알림 설정
    notifications.argoproj.io/subscribe.on-sync-failed.discord: "" # 실패
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: "" # 성공
spec:
  project: prod # prod
  source:
    repoURL: https://github.com/kakao4-KAKAMU/kakamu_helm.git
    targetRevision: prod # prod
    path: charts/front-chart
    helm:
      valueFiles:
        - ../../environments/prod/front/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod-front # prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  # 네임스페이스 없으면 자동 생성
      - Replace=true          # 꼬인 리소스 무조건 덮어쓰기
      - Validate=false        # 스키마 검증 생략 (속도 향상 및 에러 방지)