apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kakamu-shared-platform
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: shared
  source:
    repoURL: https://github.com/kakao4-KAKAMU/kakamu_helm.git
    targetRevision: main
    path: platform/shared
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
