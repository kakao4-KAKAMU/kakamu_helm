apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kakamu-data
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "1" # 우선순위 2
spec:
  project: default
  source:
    repoURL: https://github.com/kakao4-KAKAMU/kakamu_helm.git
    targetRevision: main
    path: charts/data-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
