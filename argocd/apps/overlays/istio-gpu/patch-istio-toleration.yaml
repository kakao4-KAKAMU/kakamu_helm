apiVersion: apps/v1
kind: Deployment
metadata:
  name: istiod
  namespace: istio-system

spec:
  template:
    spec:
      nodeSelector:
        gpu: "true"

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: istio-ingressgateway
  namespace: istio-system

spec:
  template:
    spec:
      nodeSelector:
        gpu: "true"

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule