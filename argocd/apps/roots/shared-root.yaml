apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-root
  namespace: argo
spec:
  project: shared
  source:
    repoURL: https://github.com/kakao4-KAKAMU/kakamu_helm.git
    targetRevision: main # main 브랜치
    path: argocd/apps/shared # shared 관련 애플리케이션만 배포
    directory:
      recurse: true # 하위 디렉토리 탐색
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
