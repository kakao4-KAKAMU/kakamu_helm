apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: front-ingress
    # 중요: 서브 경로를 사용할 때 경로 재작성 규칙
spec:
  ingressClassName: nginx
  # 나중에 도메인 생기면   - host: 필드로 변경
  rules:
  - host: filma.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: front-service # 프론트 서비스 이름 (clusterIP)
            port:
              number: 3000 # 프론트 서비스의 port 와 일치해야 함.