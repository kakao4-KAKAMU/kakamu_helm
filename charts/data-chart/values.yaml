postgresql:
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: latest # latest 태그지만 digest(sha)으로 고정, 버전 확인 결과 18.3
    digest: sha256:8ee67b02aa9d8d0932b7215b6b0cdd418e87caa324a34ebefef1742737aa2400 
  architecture: replication

  auth:
    username: kakamu
    database: kakamu
    existingSecret: postgresql-secret # db 비밀번호 저장된 secret
    secretKeys:
      userPasswordKey: password  # primary 키
      replicationPasswordKey: replication-password # replica 키

  primary:
    nodeSelector:
      kubernetes.io/hostname: master1
    tolerations: # 컨트롤 플레인에 배치 하기 위한 톨러레이션
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    persistence:
      enabled: true
      storageClass: local-storage
      size: 20Gi
      selector:
        matchLabels:
          role: primary
    extendedConfiguration: |
      shared_buffers = 512MB
      effective_cache_size = 1536MB
      maintenance_work_mem = 8MB
      work_mem = 8MB
      max_connections = 500
      wal_buffers = 16MB
      min_wal_size = 512MB
      max_wal_size = 1GB
      checkpoint_completion_target = 0.9
      random_page_cost = 1.1
      effective_io_concurrency = 200
      max_worker_processes = 64
      max_parallel_workers_per_gather = 64
      max_parallel_workers = 64
      autovacuum_max_workers = 64
      autovacuum_vacuum_threshold = 20
      autovacuum_naptime = 5s
      autovacuum_vacuum_cost_limit = 2000
      autovacuum_vacuum_cost_delay = 20ms
      idle_in_transaction_session_timeout = 30s
      statement_timeout = 60s
      lock_timeout = 5s
      deadlock_timeout = 1s
      log_lock_waits = on

    resources: # 리소스 확인 후 조정 필요
      requests:
        cpu: "1"
        memory: "2Gi"
      limits: {}


  readReplicas:
    replicaCount: 1

    nodeSelector:
      kubernetes.io/hostname: worker3

    persistence:
      enabled: true
      storageClass: local-storage
      size: 20Gi
      selector:
        matchLabels:
          role: replica

    resources: # 리소스 확인 후 조정 필요
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"