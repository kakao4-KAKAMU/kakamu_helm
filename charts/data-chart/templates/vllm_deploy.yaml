apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-deploy
  labels:
    app: vllm
spec:
  replicas: 1 # Pod 모두 삭제
  selector:
    matchLabels:
      app: vllm
  strategy:
    type: Recreate # 기존 pod 삭제하고 생성
  template:
    metadata:
      labels:
        app: vllm
    spec:
      runtimeClassName: nvidia # 사용할 GPU 명시
      nodeSelector:
        kubernetes.io/hostname: master1
      tolerations: # 컨트롤 플레인에 배치할 톨러레이션
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.21.0
          env:
            - name: HF_TOKEN # 환경 변수 이름 확인 필요, 안되면 HUGGING_FACE_HUB_TOKEN 으로 변경
              valueFrom:
                secretKeyRef:
                  name: vllm-token
                  key: readtoken
          args:
            - "--model"
            - "Qwen/Qwen3-8B-GGUF:Q4_K_M" # 사용할 모델 이름
            - "--hf-config-path"
            - "Qwen/Qwen3-8B"
            - "--tokenizer"
            - "Qwen/Qwen3-8B"
            - "--trust-remote-code"
            - "--download-dir"
            - "/data"
            - "--distributed-timeout-seconds"
            - "600"
            - "--gpu-memory-utilization"
            - "0.70"
            - "--runner"
            - "generate"
            - "--max-model-len"
            - "8192"
            - "--max-num-batched-tokens"
            - "8192"
            - "--max-num-seqs" # 한 번에 16개 요청 처리
            - "16"
            - "--enforce-eager" # 안정화를 중시
            #- "--attention-backend" # 모델 백엔드 선택
            #- "FLASHINFER"
            # - "cyankiwi/gemma-4-E2B-it-AWQ-INT4" # 1. 모델 경로 변경 (positional argument)
            # - "--trust-remote-code"
            # - "--download-dir"
            # - "/data"
            # - "--tensor-parallel-size"
            # - "1"
            # - "--quantization"                 # 2. 양자화 방식 명시
            # - "compressed-tensors"
            # - "--gpu-memory-utilization"        # 3. 0.8 정도로 낮춰도 충분 (안정성 확보)
            # - "0.8"
            # - "--max-model-len"                 # 4. 8K(8192) 유지 또는 4096 권장
            # - "1024"
            # - "--dtype"
            # - "half"
            # - "--enforce-eager"                 # 7. T4의 안정성을 위해 추가 권장
          ports:
            - containerPort: 8000 # 컨테이너 포트

          resources:
            limits:
              nvidia.com/gpu.shared: "1" # gpu 1개
              memory: "32Gi"
              cpu: "8"
            requests:
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - name: model-volume
              mountPath: /data

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
          startupProbe: # 시작 프로브
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 100   # 100번 실패할 때까지 시도
            periodSeconds: 10 # 10초 마다 확인
        - name: vllm-embed
          image: vllm/vllm-openai:v0.21.0
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-token
                  key: readtoken
          args:
            - "--model"
            - "Qwen/Qwen3-Embedding-0.6B"
            - "--download-dir"
            - "/data"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8001"
            - "--runner"
            - "pooling"
            - "--convert"
            - "embed"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.20"
          ports:
            - containerPort: 8001
          resources:
            limits:
              nvidia.com/gpu.shared: "1"
          volumeMounts:
            - name: model-volume
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 300
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 300
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 100
            periodSeconds: 10
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: vllm-model-pvc
