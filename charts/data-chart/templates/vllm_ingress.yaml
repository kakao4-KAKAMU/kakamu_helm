apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-ingress
    # 중요: 서브 경로를 사용할 때 경로 재작성 규칙
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2 # rewrite 사용
spec:
  ingressClassName: nginx
  # 나중에 도메인 생기면   - host: 필드로 변경
  rules:
  - http:
      paths:
      - path: /vllm-embed(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: vllm-service # vllm-embed 서비스 이름 (clusterIP)
            port:
              number: 8001 # vllm-embed 서비스의 port 와 일치해야 함.
      - path: /vllm(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: vllm-service # vllm 서비스 이름 (clusterIP)
            port:
              number: 8000 # vllm 서비스의 port 와 일치해야 함.