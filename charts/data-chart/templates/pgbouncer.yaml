{{- if .Values.pgbouncer.enabled }}
{{- $auth := .Values.postgresql.auth }}
{{- $pgHost := .Values.pgbouncer.postgresql.host | default (printf "%s-postgresql-primary" .Release.Name) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pgbouncer
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.pgbouncer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.pgbouncer.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.pgbouncer.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: pgbouncer
          image: {{ include "kakamu-data.pgbouncer.image" . }}
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.port }}
          env:
            - name: LISTEN_ADDR
              value: {{ .Values.pgbouncer.listenAddr | quote }}
            - name: LISTEN_PORT
              value: {{ .Values.pgbouncer.port | quote }}
            - name: DB_HOST
              value: {{ $pgHost | quote }}
            - name: DB_PORT
              value: {{ .Values.pgbouncer.postgresql.port | quote }}
            - name: DB_USER
              value: {{ $auth.username | quote }}
            - name: DB_NAME
              value: {{ $auth.database | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $auth.existingSecret }}
                  key: {{ $auth.secretKeys.userPasswordKey }}
            - name: AUTH_TYPE
              value: {{ .Values.pgbouncer.authType | quote }}
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            {{- with .Values.pgbouncer.serverResetQuery }}
            - name: SERVER_RESET_QUERY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.maxClientConn }}
            - name: MAX_CLIENT_CONN
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.defaultPoolSize }}
            - name: DEFAULT_POOL_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.minPoolSize }}
            - name: MIN_POOL_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.reservePoolSize }}
            - name: RESERVE_POOL_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.reservePoolTimeout }}
            - name: RESERVE_POOL_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.maxDbConnections }}
            - name: MAX_DB_CONNECTIONS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.serverIdleTimeout }}
            - name: SERVER_IDLE_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.serverLifetime }}
            - name: SERVER_LIFETIME
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.queryWaitTimeout }}
            - name: QUERY_WAIT_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.extraEnv }}
{{ toYaml . | indent 12 }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 30
            periodSeconds: 60
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "killall -INT pgbouncer && sleep 120"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          {{- with .Values.pgbouncer.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pgbouncer
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: pgbouncer
      port: {{ .Values.pgbouncer.port }}
      targetPort: pgbouncer
{{- end }}
