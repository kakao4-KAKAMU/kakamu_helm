{{- if .Values.pgbouncer.enabled }}
{{- $auth := .Values.postgresql.auth }}
{{- $pgHost := .Values.pgbouncer.postgresql.host | default (printf "%s-postgresql-primary" .Release.Name) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pgbouncer
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.pgbouncer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.pgbouncer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgbouncer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgbouncer
          image: {{ include "kakamu-data.pgbouncer.image" . }}
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.port }}
          env:
            - name: POSTGRESQL_HOST
              value: {{ $pgHost | quote }}
            - name: POSTGRESQL_PORT
              value: {{ .Values.pgbouncer.postgresql.port | quote }}
            - name: POSTGRESQL_USERNAME
              value: {{ $auth.username | quote }}
            - name: POSTGRESQL_DATABASE
              value: {{ $auth.database | quote }}
            - name: PGBOUNCER_DATABASE
              value: {{ $auth.database | quote }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $auth.existingSecret }}
                  key: {{ $auth.secretKeys.userPasswordKey }}
            - name: PGBOUNCER_PORT
              value: {{ .Values.pgbouncer.port | quote }}
            - name: PGBOUNCER_POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            {{- with .Values.pgbouncer.maxClientConn }}
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.defaultPoolSize }}
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.minPoolSize }}
            - name: PGBOUNCER_MIN_POOL_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.reservePoolSize }}
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.reservePoolTimeout }}
            - name: PGBOUNCER_RESERVE_POOL_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.maxDbConnections }}
            - name: PGBOUNCER_MAX_DB_CONNECTIONS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.serverIdleTimeout }}
            - name: PGBOUNCER_SERVER_IDLE_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.serverLifeTime }}
            - name: PGBOUNCER_SERVER_LIFETIME
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.queryWaitTimeout }}
            - name: PGBOUNCER_QUERY_WAIT_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.pgbouncer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 30
            periodSeconds: 20
          {{- with .Values.pgbouncer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pgbouncer
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: pgbouncer
      port: {{ .Values.pgbouncer.port }}
      targetPort: pgbouncer
{{- end }}
