{{- if and .Values.neo4j.enabled .Values.neo4j.neo4j.passwordFromSecret }}
{{- $secretName := include "neo4j-chart.neo4jAuthSecretName" . }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if $secret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
data:
  NEO4J_AUTH: {{ index $secret.data "NEO4J_AUTH" | quote }}
{{- else if not .Values.argocd.enabled }}
{{- $password := randAlphaNum 14 }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  NEO4J_AUTH: {{ printf "neo4j/%s" $password | b64enc | quote }}
{{- end }}
{{- end }}
