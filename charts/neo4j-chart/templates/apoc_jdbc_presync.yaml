{{- if .Values.argocd.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neo4j-apoc-jdbc-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neo4j-apoc-jdbc-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neo4j-apoc-jdbc-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neo4j-apoc-jdbc-sync
subjects:
  - kind: ServiceAccount
    name: neo4j-apoc-jdbc-sync
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: neo4j-apoc-jdbc-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: neo4j-apoc-jdbc-sync
      restartPolicy: Never
      containers:
        - name: sync
          image: registry.k8s.io/kubernetes/kubectl:v1.32.0
          command:
            - /bin/sh
            - -ec
            - |
              PASS="$(kubectl get secret {{ .Values.postgresql.existingSecret }} -n {{ .Release.Namespace }} -o jsonpath='{.data.{{ .Values.postgresql.passwordKey }}}' | base64 -d)"
              JDBC_URL="jdbc:postgresql://{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}?user={{ .Values.postgresql.user }}&password=${PASS}"
              kubectl create secret generic {{ .Values.postgresql.apocJdbcSecretName }} \
                --from-literal=URL="${JDBC_URL}" \
                -n {{ .Release.Namespace }} \
                --dry-run=client -o yaml | kubectl apply -f -
{{- end }}
