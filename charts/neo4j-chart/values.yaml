# ArgoCD 배포 시 PreSync Job으로 Neo4j auth / APOC JDBC Secret 관리
argocd:
  enabled: true

# data-chart postgresql 설정과 동일한 연결 정보
postgresql:
  host: kakamu-data-postgresql-primary.data.svc.cluster.local
  port: 5432
  user: kakamu
  database: kakamu
  existingSecret: postgresql-secret
  passwordKey: password
  apocJdbcSecretName: neo4j-apoc-postgresql-jdbc
  # APOC JDBC용 PostgreSQL 드라이버 (Pod initContainer에서 /plugins로 다운로드)
  jdbcDriver:
    enabled: true
    jarName: pgJDBC 42.7.9.jar
    downloadUrl: https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.9/postgresql-42.7.9.jar

neo4j:
  enabled: true
  # true: nodeSelector 클러스터 검증 등 subchart lookup 비활성화 (Argo CD helm template 호환)
  # Neo4j 비밀번호는 passwordFromSecret + neo4j_auth_secret.yaml + PreSync Job으로 관리
  disableLookups: true

  neo4j:
    name: kakamu-neo4j
    edition: community
    # subchart neo4j-auth.yaml 비활성화 → 부모 차트가 Secret 수명주기 관리
    passwordFromSecret: kakamu-neo4j-auth
    resources:
      requests:
        cpu: "1"
        memory: "8Gi"
      limits:
        memory: "16Gi"

  nodeSelector:
    kubernetes.io/hostname: master1

  podSpec:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    initContainers:
      - name: download-pgjdbc
        image: curlimages/curl:8.12.1
        command: ["/bin/sh", "/scripts/download.sh"]
        volumeMounts:
          - name: data
            mountPath: /plugins
          - name: pgjdbc-init-script
            mountPath: /scripts
            readOnly: true

  env:
    NEO4J_PLUGINS: '["apoc-extended", "graph-data-science"]'

  # 플러그인 설치·JVM 기동 시간 고려 (기본 tcp:7687 프로브는 기동 전 실패 가능)
  startupProbe:
    httpGet:
      path: /
      port: 7474
    initialDelaySeconds: 90
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 120

  readinessProbe:
    tcpSocket:
      port: 7687
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 20

  livenessProbe:
    tcpSocket:
      port: 7687
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 6

  volumes:
    data:
      mode: volume
      disableSubPathExpr: true
      volume:
        persistentVolumeClaim:
          claimName: neo4j-pvc
    logs:
      mode: share
      disableSubPathExpr: true
      share:
        name: data
    plugins:
      mode: share
      disableSubPathExpr: true
      share:
        name: data

  additionalVolumes:
    - name: pgjdbc-init-script
      configMap:
        name: neo4j-pgjdbc-init
        defaultMode: 0755

  services:
    neo4j:
      enabled: true
      spec:
        type: NodePort
      ports:
        http:
          enabled: true
          port: 7474
          targetPort: 7474
        https:
          enabled: false
        bolt:
          enabled: true
          port: 7687
          targetPort: 7687

  config:
    server.default_listen_address: "0.0.0.0"
    server.config.strict_validation.enabled: "false"

    server.http.enabled: "true"
    server.http.listen_address: ":7474"

    server.bolt.enabled: "true"
    server.bolt.listen_address: ":7687"
    server.bolt.advertised_address: ":7687"
    server.bolt.tls_level: "DISABLED"

    server.logs.query.enabled: "true"
    server.logs.query.level: "INFO"

    dbms.security.procedures.unrestricted: "apoc.*,gds.*"
    dbms.security.procedures.allowlist: "apoc.*,gds.*"

    db.query.default_language: "CYPHER_25"

    server.memory.pagecache.size: "3G"
    server.memory.heap.initial_size: "4G"
    server.memory.heap.max_size: "4G"
    server.memory.transaction.max_size: "1.5G"
    server.memory.transaction.global_max_size: "3G"
    server.directories.logs: "/logs"
    server.directories.plugins: "/plugins"

  jvm:
    additionalJvmArguments:
    - "-XX:+UseG1GC"
    - "-XX:InitiatingHeapOccupancyPercent=45"
    - "-XX:G1ReservePercent=15"

  apoc_config:
    apoc.import.file.use_neo4j_config: "true"
    apoc.import.file.enabled: "true"
    apoc.export.file.enabled: "true"

  apoc_credentials:
    jdbc:
      aliasName: "postgresql"
      secretName: neo4j-apoc-postgresql-jdbc
      secretMountPath: "/secret/postgresqlCred"
