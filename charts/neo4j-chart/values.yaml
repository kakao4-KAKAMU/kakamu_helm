# ArgoCD 배포 시 PreSync Job으로 APOC JDBC Secret 생성
argocd:
  enabled: true

# data-chart postgresql 설정과 동일한 연결 정보
postgresql:
  host: kakamu-data-postgresql-primary.data.svc.cluster.local
  port: 5432
  user: kakamu
  database: kakamu
  existingSecret: postgresql-secret
  passwordKey: password
  apocJdbcSecretName: neo4j-apoc-postgresql-jdbc

neo4j:
  enabled: true
  disableLookups: true

  neo4j:
    name: kakamu-neo4j
    edition: community
    resources:
      requests:
        cpu: 1
        memory: "2Gi"
      limits:
        memory: "2Gi"

  nodeSelector:
    kubernetes.io/hostname: worker3

  env:
    NEO4J_PLUGINS: '["apoc-extended", "graph-data-science"]'

  volumes:
    data:
      mode: volume
      disableSubPathExpr: true
      volume:
        persistentVolumeClaim:
          claimName: neo4j-pvc
    logs:
      mode: share
      disableSubPathExpr: true
      share:
        name: data

  services:
    neo4j:
      enabled: true
      spec:
        type: ClusterIP

  config:
    server.default_listen_address: "0.0.0.0"
    server.config.strict_validation.enabled: "true"

    server.bolt.enabled: "true"
    server.bolt.listen_address: ":7687"
    server.bolt.advertised_address: "localhost:7687"
    server.bolt.tls_level: "DISABLED"

    dbms.security.procedures.unrestricted: "apoc.*,gds.*"
    dbms.security.procedures.allowlist: "apoc.*,gds.*"

    server.memory.pagecache.size: "256m"
    server.memory.heap.max_size: "512G"
    server.memory.heap.initial_size: "256m"
    server.directories.logs: "/logs"

  apoc_config:
    apoc.import.file.use_neo4j_config: "true"
    apoc.import.file.enabled: "true"
    apoc.export.file.enabled: "true"

  apoc_credentials:
    jdbc:
      aliasName: "postgresql"
      secretName: neo4j-apoc-postgresql-jdbc
      secretMountPath: "/secret/postgresqlCred"
