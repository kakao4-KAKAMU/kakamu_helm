apiVersion: v1
kind: ConfigMap
metadata:
  name: movie-recommend-config
  namespace: {{ .Release.Namespace }}
data:
  # vLLM Generation
  VLLM_GEN__API_KEY: "EMPTY"
  VLLM_GEN__MODEL_NAME: "Qwen/Qwen3-8B-AWQ"
  VLLM_GEN__MAX_TOKENS: "1024"
  VLLM_GEN__TEMPERATURE: "0.6"
  VLLM_GEN__ENABLE_PREFIX_CACHING: "true"
  VLLM_GEN__ENABLE_CHUNKED_PREFILL: "true"
  VLLM_GEN__GPU_MEMORY_UTILIZATION: "0.65"
  VLLM_GEN__BLOCK_SIZE: "16"
  VLLM_GEN__MAX_MODEL_LEN: "8192"
  VLLM_GEN__MAX_NUM_SEQS: "32"

  # vLLM Embedding
  VLLM_EMBED__API_KEY: "EMPTY"
  VLLM_EMBED__MODEL_NAME: "Qwen/Qwen3-Embedding-0.6B"
  VLLM_EMBED__GPU_MEMORY_UTILIZATION: "0.20"
  VLLM_EMBED__CACHE_SIZE: "4096"
  EMBED__MODEL_NAME: "Qwen/Qwen3-Embedding-0.6B"
  EMBED__DIMENSION: "1024"
  EMBED__NORMALIZE: "true"

  # Service 공통
  APP_ENV: "dev"
  LOG_LEVEL: "INFO"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8080"

  # Ontology
  ONTOLOGY_PROMPT_VERSION: "1.0"
  ONTOLOGY_MODEL_NAME: "Qwen/Qwen3-8B-AWQ"

  # Vocab
  VOCAB_PROMOTE_MIN_COUNT: "50"
  VOCAB_PROMOTE_MIN_DAYS: "7"
  VOCAB_ALIAS_COS_SIM: "0.90"
  VOCAB_PROMOTE_MAX_COS_SIM: "0.85"

  # Bandit
  BANDIT_BASELINE_MIN_SHARE: "0.05"
  BANDIT_MAX_WEIGHT_DELTA: "0.20"

  # Judge / drift
  JUDGE_DAILY_SAMPLE_SIZE: "100"
  DRIFT_KL_THRESHOLD: "0.15"
  EVAL_SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/..." # (실제 URL 주소 작성)